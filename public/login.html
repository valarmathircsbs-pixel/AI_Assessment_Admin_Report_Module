<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3 class="text-center">Admin Login</h3>

        <input type="email" id="email" class="form-control mt-3" placeholder="Email">
        <input type="password" id="password" class="form-control mt-3" placeholder="Password">

        <button class="btn btn-primary w-100 mt-3" onclick="login()">Login</button>
    </div>
</div>

<script>
async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const res = await fetch('/admin/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.success) {
        localStorage.setItem('token', data.token);
        window.location.href = 'dashboard.html';
    } else {
        alert('Invalid credentials');
    }
}
</script>

</body>
</html>
