<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
    <h2>Admin Dashboard</h2>
    <button class="btn btn-danger float-end" onclick="logout()">Logout</button>

    <table class="table table-bordered mt-4">
        <thead>
            <tr>
                <th>Candidate ID</th>
                <th>Name</th>
                <th>Domain</th>
                <th>Download</th>
            </tr>
        </thead>
        <tbody id="candidateTable"></tbody>
    </table>
</div>

<script>
async function loadCandidates() {
    const res = await fetch('/admin/report');
    const data = await res.json();

    if (data.success) {
        let rows = '';

        data.data.forEach(candidate => {
            rows += `
                <tr>
                    <td>${candidate.candidateId}</td>
                    <td>${candidate.name}</td>
                    <td>${candidate.domain}</td>
                    <td>
                        <button class="btn btn-success" onclick="downloadReport('${candidate.candidateId}')">
                            Download
                        </button>
                    </td>
                </tr>
            `;
        });

        document.getElementById('candidateTable').innerHTML = rows;
    }
}

function downloadReport(id) {
    const token = localStorage.getItem('token');

    fetch(`/admin/report/${id}/download`, {
        headers: {
            'Authorization': 'Bearer ' + token
        }
    })
    .then(response => response.blob())
    .then(blob => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'report.pdf';
        a.click();
    });
}

function logout() {
    localStorage.removeItem('token');
    window.location.href = 'login.html';
}

loadCandidates();
</script>

</body>
</html>
